# /etc/pgbouncer/pgbouncer.ini
# PgBouncer configuration optimized for 1000 client connections funnelling to 60 PG connections

[databases]
petition_db = host=postgres port=5432 dbname=petition_db

[pgbouncer]
listen_port         = 5432
listen_addr         = 0.0.0.0
auth_type           = scram-sha-256
auth_file           = /etc/pgbouncer/userlist.txt

# TRANSACTION POOLING — best for stateless REST API requests (Bottleneck 1)
pool_mode           = transaction

# Funnel up to 1000 app connections to 60 real database connections
default_pool_size   = 60
max_client_conn     = 1000

# Release idle server connections after 30s
server_idle_timeout = 30

# Queue app requests for up to 5s before rejecting
query_wait_timeout  = 5

# Production performance logs tuning
log_connections     = 0
log_disconnections  = 0
