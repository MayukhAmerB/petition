# /etc/nginx/nginx.conf
# Nginx Configuration optimized for high-traffic (10,000 concurrent users)
# Security-hardened against XSS, Clickjacking, MIME-sniffing, and content injection

worker_processes      auto;           # Matches 8 vCPUs
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;         # 8 × 4096 = 32,768 max connections
    use                 epoll;
    multi_accept        on;
}

http {
    include             mime.types;
    default_type        application/octet-stream;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Hide server version information
    server_tokens       off;

    # Trust the host-level reverse proxy so rate limits use the real visitor IP
    # instead of Docker's gateway address (for example 172.19.0.1).
    set_real_ip_from    10.0.0.0/8;
    set_real_ip_from    172.16.0.0/12;
    set_real_ip_from    192.168.0.0/16;
    real_ip_header      X-Forwarded-For;
    real_ip_recursive   on;

    # The Docker Nginx only receives traffic from the host reverse proxy.
    # Use the first forwarded address as the rate-limit identity so public
    # users do not all share Docker's gateway IP in the same limit bucket.
    map $http_x_forwarded_for $client_rate_limit_key {
        "~^\s*([^,\s]+)" $1;
        default          $remote_addr;
    }

    gzip                on;
    gzip_disable        "msie6";
    gzip_types          application/json text/plain text/css application/javascript;

    # Make rate-limit responses explicit instead of returning a misleading 503.
    limit_req_status    429;

    # Rate limiting zones (Bottleneck 3 & rate limit specs)
    # Zone for strict OTP request limiting (5 requests per minute per IP)
    limit_req_zone $client_rate_limit_key zone=otp:10m rate=5r/m;
    # Zone for API requests (100 requests per second per IP)
    limit_req_zone $client_rate_limit_key zone=api:10m rate=100r/s;
    # Zone for signing petitions (10 requests per minute per IP to prevent signature spamming)
    limit_req_zone $client_rate_limit_key zone=sign:10m rate=10r/m;

    # Upstream to 4x Rust API backends (round-robin load balancing)
    upstream rust_api {
        least_conn;                   # Route to the backend with fewest active connections
        server api-1:3000;
        server api-2:3000;
        server api-3:3000;
        server api-4:3000;
        keepalive 64;                 # Keepalive connection pool across all backends
    }

    server {
        listen 80;
        server_name localhost;        # Replace with yourdomain.com in production
        client_max_body_size 150m;

        # Permanent redirect to HTTPS in production
        # return 301 https://$host$request_uri;

        # ─── Security Response Headers ───
        # XSS Protection: Legacy filter for older browsers
        add_header X-XSS-Protection "1; mode=block" always;
        # Prevent MIME-type sniffing attacks
        add_header X-Content-Type-Options "nosniff" always;
        # Prevent clickjacking via iframes
        add_header X-Frame-Options "DENY" always;
        # Content Security Policy: restrict script/style sources
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Permissions policy: disable unnecessary browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # Strict Transport Security (effective when HTTPS is enabled)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Static frontend (Vite build folder mapped to /var/www/petition/dist)
        root /var/www/petition/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # OTP endpoints with strict rate limiting (Bottleneck 10.3 / Nginx OTP section)
        location /api/otp/ {
            limit_req zone=otp burst=3 nodelay;
            proxy_pass         http://rust_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Hide upstream server headers
            proxy_hide_header  X-Powered-By;
        }

        # Petition signing with strict rate limiting (10 requests per minute per IP)
        location /api/petition/sign {
            limit_req zone=sign burst=5 nodelay;
            proxy_pass         http://rust_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Hide upstream server headers
            proxy_hide_header  X-Powered-By;
        }

        # General API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://rust_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
            # Hide upstream server headers
            proxy_hide_header  X-Powered-By;
        }
    }
}
