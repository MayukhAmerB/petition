services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: petition_db
      POSTGRES_USER: petition_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=8GB
      -c work_mem=64MB
      -c max_connections=100
      -c effective_cache_size=20GB
      -c wal_buffers=64MB

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: petition_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: petition_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 60
      AUTH_TYPE: scram-sha-256
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --save ""
    volumes:
      - redis_data:/data

  # ─── 4x Load-Balanced API Backends ───

  api-1:
    build:
      context: ./services/petition-api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://petition_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@pgbouncer:5432/petition_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      - pgbouncer
      - redis

  api-2:
    build:
      context: ./services/petition-api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://petition_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@pgbouncer:5432/petition_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      - pgbouncer
      - redis

  api-3:
    build:
      context: ./services/petition-api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://petition_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@pgbouncer:5432/petition_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      - pgbouncer
      - redis

  api-4:
    build:
      context: ./services/petition-api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://petition_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@pgbouncer:5432/petition_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      - pgbouncer
      - redis

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '127.0.0.1:8095:80'
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/adlfront/dist:/var/www/petition/dist:ro
    depends_on:
      - api-1
      - api-2
      - api-3
      - api-4

volumes:
  pg_data:
  redis_data:
